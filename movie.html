<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MovieStream | Movie Details</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<header>


<div class="logo">
🎬 MovieStream
</div>


<a href="index.html" class="back">
← Back Home
</a>


</header>





<section class="movie-details">


<div class="movie-poster-box">


<img id="movie-poster" 
src=""
alt="Movie Poster">


</div>





<div class="movie-info">


<h1 id="movie-title">
Loading Movie...
</h1>





<div class="movie-meta">


<span>
⭐ <b id="rating">Loading</b>
</span>


<span>
🎭 <b id="category">Loading</b>
</span>


<span>
📅 <b id="year">Loading</b>
</span>


</div>






<p id="movie-description">

Loading movie description...

</p>






<div class="movie-buttons">


<button class="watch">

▶ Watch Now

</button>


<button class="info">

♡ Add To Favorites

</button>


</div>



</div>


</section>







<section class="related">


<h2>
More Movies
</h2>


<div class="movies" id="recommended-movies">

</div>


</section>







<script src="movie.js"></script>


</body>


</html>
